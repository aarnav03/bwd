<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Tame Impala UI</title>
	<link rel="stylesheet" href="styles.css" />
</head>

<body>

	<div class="container">

		<!-- LEFT: VINYL -->
		<div class="vinyl-section">
			<div class="vinyl">
				<div class="label">
					<!-- <div class="bars"></div> -->
					<img src="cover.jpg" alt="">
				</div>
			</div>
			<p class="track-name">02. BORDERLINE</p>
			<p class="time">2:43 / 4:08</p>
		</div>

		<!-- RIGHT: CONTENT -->
		<div class="content">
			<div class="nav">
				<span>ARTISTS</span>
				<span>MIXTAPES</span>
				<span>AWARDS</span>
			</div>

			<h1 class="title">TAME<br>IMPALA</h1>
			<p class="genres">PSYCHEDELIC POP, ROCK, DISCO, SYNTH-POP</p>

			<div class="popular">
				<h3>POPULAR</h3>

				<div class="track">
					<span>01</span>
					<div>
						<p>THE LESS I KNOW THE BETTER</p>
						<small>CURRENTS</small>
					</div>
					<span>3:36</span>
				</div>

				<div class="track">
					<span>02</span>
					<div>
						<p>BORDERLINE</p>
						<small>THE SLOW RUSH</small>
					</div>
					<span>4:08</span>
				</div>

				<div class="track">
					<span>03</span>
					<div>
						<p>FEELS LIKE WE ONLY GO BACKWARDS</p>
						<small>LONERISM</small>
					</div>
					<span>3:12</span>
				</div>

				<div class="track">
					<span>04</span>
					<div>
						<p>NO CHOICE</p>
						<small>THE SLOW RUSH</small>
					</div>
					<span>3:41</span>
				</div>

				<a href="#" class="view-more">VIEW MORE</a>
				<button class="next-btn" onclick="nextAlbum()">NEXT →</button>
			</div>
		</div>

	</div>

	<script>
		const albums = [
			{
				title: ["TAME", "IMPALA"],
				track: "BORDERLINE",
				time: "4:08",
				img: "cover.jpg"
			},
			{
				title: ["KANYE", "WEST"],
				track: "FLASHING LIGHTS",
				time: "3:57",
				img: "cover2.jpg"
			},
			{
				title: ["CHAAR", "DIWARI"],
				track: "PARVANA",
				time: "2:45",
				img: "cover3.jpg"
			}
		];

		let current = 0;

		function nextAlbum() {
			current = (current + 1) % albums.length;
			const album = albums[current];

			document.querySelector(".title").innerHTML =
				album.title.join("<br>");

			document.querySelector(".track-name").textContent =
				"01. " + album.track;

			document.querySelector(".time").textContent =
				"0:00 / " + album.time;

			document.querySelector(".label img").src =
				album.img;

			const vinyl = document.querySelector(".vinyl");
			vinyl.classList.add("spin");

			setTimeout(() => {
				vinyl.classList.remove("spin");
			}, 500);
		}
	</script>
</body>

</html>
